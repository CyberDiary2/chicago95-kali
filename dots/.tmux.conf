# ── prefix ────────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── base ──────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── bindings ──────────────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── everforest moss statusbar ─────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# everforest hard dark palette
BG="#2d353b"
BG2="#343f44"
FG="#d3c6aa"
MOSS="#a7c080"
TEAL="#83c092"
DIM="#475258"

set -g status-style "bg=${BG},fg=${FG}"
set -g status-left "#[bg=${MOSS},fg=${BG},bold] #S #[bg=${BG},fg=${MOSS}]"
set -g status-left-length 20
set -g status-right "#[fg=${DIM}]#{pane_current_path} #[fg=${TEAL}]%H:%M #[bg=${TEAL},fg=${BG},bold] #h "
set -g status-right-length 60

set -g window-status-format         "#[fg=${DIM}] #I:#W "
set -g window-status-current-format "#[bg=${BG2},fg=${MOSS},bold] #I:#W "
set -g window-status-separator ""

set -g pane-border-style        "fg=${DIM}"
set -g pane-active-border-style "fg=${MOSS}"
set -g message-style            "bg=${BG2},fg=${MOSS}"
